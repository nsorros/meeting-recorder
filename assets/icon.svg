<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b4a63"/>
      <stop offset="1" stop-color="#1e2633"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d7deea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- rounded tile -->
  <rect x="96" y="96" width="832" height="832" rx="196" fill="url(#tile)"/>
  <rect x="96" y="96" width="832" height="832" rx="196" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="4"/>

  <g filter="url(#shadow)">
    <!-- mic capsule -->
    <rect x="412" y="250" width="200" height="380" rx="100" fill="url(#mic)"/>
    <!-- capsule grille lines -->
    <g stroke="#aeb8c8" stroke-width="10" stroke-linecap="round" opacity="0.55">
      <line x1="452" y1="330" x2="572" y2="330"/>
      <line x1="452" y1="392" x2="572" y2="392"/>
      <line x1="452" y1="454" x2="572" y2="454"/>
    </g>
    <!-- cradle arc -->
    <path d="M330 512 a182 182 0 0 0 364 0" fill="none" stroke="url(#mic)" stroke-width="42" stroke-linecap="round"/>
    <!-- stand -->
    <rect x="490" y="694" width="44" height="96" rx="22" fill="url(#mic)"/>
    <!-- base -->
    <rect x="392" y="778" width="240" height="46" rx="23" fill="url(#mic)"/>
  </g>

  <!-- record accent dot -->
  <circle cx="672" cy="352" r="46" fill="#ff4d4f"/>
  <circle cx="672" cy="352" r="46" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="6"/>
</svg>
